<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Технические листы · Александр & Ксения · 27.06.2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/card1.css">
  <link rel="stylesheet" href="css/card2.css">
  <link rel="stylesheet" href="css/card3.css">
  <link rel="stylesheet" href="css/card4.css">

  <style>
    /* One card per page when printing or exporting to PDF */
    .card-section {
      page-break-after: always;
      break-after: page;
    }
    /* Compact stage — no need for the large preview area padding */
    .stage {
      min-height: 0 !important;
      padding: 40px !important;
    }
    /* Tighter page padding for PDF capture */
    body {
      padding: 20px 28px 40px !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="src/data.js"></script>
  <script src="src/app.js"></script>
  <script>
    // Must run after app.js's DOMContentLoaded handler (which calls render())
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelector('.app-head').remove();
      document.querySelector('.tabs').remove();

      document.querySelectorAll('.card-section').forEach(function (section) {
        section.style.display = '';          // show all cards
        section.querySelector('.toolbar').remove();
        section.querySelector('.stack-stage').remove();
        section.querySelector('.stage-label').remove();
      });

      // ?card=card1 → show only that card (used for per-card spec PDFs)
      var only = new URLSearchParams(location.search).get('card');
      if (only) {
        document.querySelectorAll('.card-section').forEach(function (s) {
          if (s.id !== only + '-section') s.style.display = 'none';
        });
      }
    });
  </script>
</body>
</html>
