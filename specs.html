<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Технические листы · Александр & Ксения · 27.06.2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="card1.css">
  <link rel="stylesheet" href="card2.css">
  <link rel="stylesheet" href="card3.css">
  <link rel="stylesheet" href="card4.css">

  <style>
    /* One card per page when printing or exporting to PDF */
    .card-section {
      page-break-after: always;
      break-after: page;
    }
    /* Compact stage — no need for the large preview area padding */
    .stage {
      min-height: 0 !important;
      padding: 40px !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    // app.js has already rendered; strip interactive chrome
    document.querySelector('.tabs').remove();

    document.querySelectorAll('.card-section').forEach(function (section) {
      section.style.display = '';          // show all cards
      section.querySelector('.toolbar').remove();
      section.querySelector('.stack-stage').remove();
    });
  </script>
</body>
</html>
